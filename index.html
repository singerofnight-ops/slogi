<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Слоговое Русское Лото</title>
    
    <!-- Tailwind CSS для стилей -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Добавляем шрифты и анимации -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Roboto Slab', serif;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-wiggle { animation: wiggle 0.2s ease-in-out infinite; }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .perspective-1000 {
            perspective: 1000px;
        }
    </style>
</head>
<body class="bg-green-800 h-screen overflow-hidden text-gray-900 antialiased">

    <!-- Фоновый узор -->
    <div class="fixed inset-0 opacity-10 pointer-events-none z-0" style="background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 20px 20px;"></div>

    <!-- ЭКРАН 1: МЕНЮ -->
    <div id="screen-menu" class="hidden flex-col items-center min-h-screen p-4 text-amber-100 relative overflow-hidden z-10 w-full h-full overflow-y-auto pb-32">
        
        <h1 class="text-3xl md:text-5xl font-black text-amber-200 mb-2 text-center uppercase tracking-wider mt-4 drop-shadow-lg" style="text-shadow: 2px 4px 0px #3a1c06;">
            Русское Лото
        </h1>
        
        <!-- Переключатель режимов -->
        <div class="flex bg-green-900/60 p-1 rounded-xl mb-6 backdrop-blur-md border border-green-700 shadow-inner z-10">
            <button id="btn-mode-cons" onclick="switchMode('consonants')" class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all font-bold bg-amber-500 text-amber-950 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> 
                По согласным
            </button>
            <button id="btn-mode-vow" onclick="switchMode('vowels')" class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all font-bold text-green-300 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg> 
                По гласным
            </button>
        </div>
        
        <!-- Контролы -->
        <div class="flex gap-4 mb-4 w-full max-w-5xl justify-between items-center z-10 px-2">
            <p class="text-sm md:text-lg font-bold bg-green-900/50 px-4 py-2 rounded-lg backdrop-blur-sm border border-green-700">
                Выбрано: <span id="selected-count">0</span>
            </p>
            <button id="btn-select-all" onclick="selectAll()" class="text-xs md:text-sm text-amber-100 font-bold hover:bg-green-700/50 px-4 py-2 rounded-lg transition-colors border border-amber-100/30">
                Выбрать всё
            </button>
        </div>
        
        <!-- Сетка бочонков (рендерится через JS) -->
        <div id="menu-grid" class="grid grid-cols-5 md:grid-cols-6 lg:grid-cols-8 gap-3 md:gap-4 max-w-6xl w-full z-10 perspective-1000 px-2">
            <!-- Бочонки -->
        </div>

        <!-- Кнопка Старта -->
        <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-green-900 via-green-900/90 to-transparent flex justify-center z-20 pointer-events-none">
            <button id="btn-start" onclick="startGame()" disabled class="pointer-events-auto px-12 md:px-16 py-4 md:py-5 rounded-2xl shadow-2xl text-2xl md:text-3xl font-bold flex items-center gap-4 transition-all transform border-b-8 border-r-4 bg-gray-600 text-gray-400 border-gray-800 translate-y-10 opacity-0 cursor-not-allowed">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> 
                ИГРАТЬ
            </button>
        </div>
    </div>

    <!-- ЭКРАН 2: ИГРА -->
    <div id="screen-game" class="hidden flex-col items-center justify-center min-h-screen p-4 cursor-pointer select-none overflow-hidden relative z-10" onclick="toggleSpin(event)">
        
        <div class="absolute inset-0 opacity-20 pointer-events-none mix-blend-overlay" style="background-image: url('data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'%23000000\' fill-opacity=\'1\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');"></div>

        <div class="absolute top-4 left-4 flex gap-4 z-20">
            <button onclick="goMenu(event)" class="flex items-center gap-2 px-5 py-2 bg-amber-100 rounded-full shadow-lg text-amber-900 hover:bg-white font-bold border-2 border-amber-800 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12"/><path d="M3 3v9h9"/></svg> 
                Меню
            </button>
        </div>

        <div class="absolute top-4 right-4 z-20">
            <button id="btn-volume" onclick="toggleSound(event)" class="p-3 rounded-full shadow-lg border-2 border-amber-800 transition-colors bg-amber-100 text-amber-900">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
            </button>
        </div>

        <div class="relative w-full flex flex-col justify-center items-center z-10">
            <div class="absolute -bottom-64 transition-transform duration-500 ease-in-out">
                <svg id="bag-icon" xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-900/40 drop-shadow-2xl transition-transform duration-300">
                    <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/>
                </svg>
            </div>

            <div class="relative z-20 pt-10">
                 <!-- Большой бочонок -->
                 <div id="big-keg" class="w-64 h-64 md:w-96 md:h-96 text-8xl md:text-[180px] relative rounded-full shadow-xl flex items-center justify-center font-bold select-none transition-transform duration-100 transform border-b-8 border-r-4 shadow-[inset_2px_2px_10px_rgba(255,255,255,0.4)] bg-gradient-to-br from-amber-200 via-amber-300 to-amber-500 text-amber-950 border-amber-700 animate-pop">
                    <span id="big-keg-text" class="drop-shadow-md z-10">СТАРТ</span>
                    <div class="absolute inset-2 rounded-full border-2 border-black/10 pointer-events-none"></div>
                 </div>
            </div>

            <div id="hint-text" class="hidden mt-12 animate-bounce bg-white/90 text-green-900 px-8 py-3 rounded-full font-bold text-xl shadow-xl border-2 border-green-700 text-center">
                Нажми пробел, чтобы достать бочонок
            </div>
        </div>

        <div class="absolute bottom-8 bg-amber-900/40 backdrop-blur-md p-4 rounded-2xl border border-amber-700/50 w-full max-w-2xl mx-4 flex flex-col items-center">
            <div class="flex justify-between w-full text-amber-100 mb-2 px-2 font-mono font-bold">
                <span>ОСТАЛОСЬ: <span id="stat-remaining">0</span></span>
                <span>ВСЕГО: <span id="stat-total">0</span></span>
            </div>
            
            <div class="h-6 w-full bg-black/40 rounded-full overflow-hidden border border-amber-900/50 p-1">
                <div id="progress-fill" class="h-full rounded-full shadow-[inset_0_2px_4px_rgba(255,255,255,0.4)] transition-all duration-500 ease-out bg-gradient-to-r from-amber-500 to-yellow-400" style="width: 0%;"></div>
            </div>
        </div>
    </div>

    <!-- ЭКРАН 3: ФИНИШ -->
    <div id="screen-finished" class="hidden flex-col items-center justify-center min-h-screen p-4 font-sans text-center relative overflow-hidden z-10">
        <div class="absolute inset-0 opacity-20" style="background-image: url('data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'%23000000\' fill-opacity=\'1\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');"></div>

        <div class="bg-amber-100 p-12 rounded-[3rem] shadow-2xl border-8 border-amber-700 animate-pop max-w-2xl w-full z-10 relative">
            <div class="absolute -top-10 left-1/2 -translate-x-1/2 bg-red-600 text-white px-8 py-2 rounded-full font-bold shadow-lg border-4 border-white">
                ФИНИШ
            </div>
            
            <h2 class="text-5xl md:text-6xl font-black text-amber-900 mb-6 drop-shadow-sm mt-4">ПОБЕДА!</h2>
            <p class="text-2xl text-amber-800 mb-8 font-serif">
                Мешочек пуст. Все <span id="finish-total">0</span> бочонков найдены!
            </p>
            
            <button onclick="goMenu(event)" class="w-full md:w-auto px-10 py-5 bg-green-600 hover:bg-green-500 text-white text-xl md:text-2xl font-bold rounded-2xl shadow-xl border-b-8 border-green-800 active:border-b-0 active:translate-y-2 transition-all flex items-center justify-center gap-3 mx-auto">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12"/><path d="M3 3v9h9"/></svg> 
                НОВАЯ ИГРА
            </button>
        </div>
    </div>

    <script>
        // Базы данных слогов
        const SYLLABLES_DB = {
            "М": ["МА", "МУ", "МИ", "МЫ", "МО", "МЕ", "МЭ"],
            "С": ["СА", "СЫ", "СИ", "СЕ", "СУ", "СО", "СЭ"],
            "Х": ["ХА", "ХУ", "ХО", "ХИ", "ХЭ"],
            "Р": ["РА", "РИ", "РУ", "РЫ", "РЕ", "РО", "РЭ"],
            "Ш": ["ШУ", "ШО", "ШИ", "ША", "ШЕ"],
            "Л": ["ЛЫ", "ЛА", "ЛУ", "ЛЮ", "ЛЯ", "ЛИ", "ЛЕ", "ЛО", "ЛЁ", "ЛЭ"],
            "Н": ["НИ", "НУ", "НА", "НЫ", "НЯ", "НЕ", "НО", "НЭ"],
            "К": ["КА", "КЕ", "КУ", "КО", "КИ", "КЭ"],
            "Т": ["ТЕ", "ТА", "ТИ", "ТЫ", "ТЮ", "ТУ", "ТО", "ТЭ"],
            "П": ["ПЯ", "ПА", "ПУ", "ПО", "ПИ", "ПЕ", "ПЭ"],
            "З": ["ЗА", "ЗО", "ЗИ", "ЗЕ", "ЗУ", "ЗЭ"],
            "Г": ["ГА", "ГИ", "ГО", "ГУ", "ГЕ", "ГЭ"],
            "В": ["ВИ", "ВО", "ВЯ", "ВЫ", "ВА", "ВУ", "ВЕ", "ВЭ"],
            "Д": ["ДЫ", "ДЕ", "ДЯ", "ДА", "ДУ", "ДО", "ДИ", "ДЭ"],
            "Б": ["БИ", "БЕ", "БУ", "БА", "БО", "БЭ"],
            "Ж": ["ЖЕ", "ЖУ", "ЖЁ", "ЖИ", "ЖА"],
            "Ч": ["ЧУ", "ЧЁ", "ЧИ", "ЧА", "ЧЕ"],
            "Ц": ["ЦЕ", "ЦУ", "ЦИ", "ЦА", "ЦО"],
            "Щ": ["ЩЁ", "ЩУ", "ЩЕ", "ЩА", "ЩИ"],
            "Ф": ["ФЕ", "ФА", "ФУ", "ФО", "ФИ", "ФЭ"]
        };

        const VOWELS_DB = {};
        const vowels = ['А', 'О', 'У', 'Ы', 'Э', 'Я', 'Ё', 'Ю', 'И', 'Е'];
        vowels.forEach(v => VOWELS_DB[v] = []);
        Object.values(SYLLABLES_DB).flat().forEach(syllable => {
            const lastChar = syllable.slice(-1).toUpperCase();
            if (VOWELS_DB[lastChar]) {
                VOWELS_DB[lastChar].push(syllable);
            }
        });

        // Состояние игры
        let gameState = 'menu';
        let mode = 'consonants';
        let selectedKeys = [];
        let currentSyllable = "?";
        let pool = [];
        let initialPoolSize = 0;
        let isSpinning = false;
        let spinIntervalId = null;
        let soundEnabled = true;

        // Звуки
        function playSound(type) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                if (type === 'tick') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.05);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.05);
                } else if (type === 'win') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(500, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(800, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1);
                    osc.start();
                    osc.stop(ctx.currentTime + 1);
                }
            } catch (e) {
                console.error("Audio error", e);
            }
        }

        function showScreen(screenId) {
            ['screen-menu', 'screen-game', 'screen-finished'].forEach(id => {
                const el = document.getElementById(id);
                el.classList.add('hidden');
                el.classList.remove('flex');
            });
            const active = document.getElementById(screenId);
            active.classList.remove('hidden');
            active.classList.add('flex');
        }

        function getSmallKegHTML(text, currentMode, isSelected) {
            const baseClasses = "w-16 h-16 md:w-20 md:h-20 text-2xl md:text-3xl relative rounded-full shadow-xl flex items-center justify-center font-bold select-none transition-transform duration-100 transform cursor-pointer hover:-translate-y-1 active:translate-y-0 active:border-b-4";
            const texture = currentMode === 'vowels' 
                ? "bg-gradient-to-br from-red-100 via-red-300 to-red-500 text-red-950 border-red-800" 
                : "bg-gradient-to-br from-amber-200 via-amber-300 to-amber-500 text-amber-950 border-amber-700";
            const selectedClasses = "ring-4 ring-white scale-105 shadow-[0_0_20px_rgba(255,255,255,0.6)]";
            const baseBorder = "border-b-8 border-r-4 shadow-[inset_2px_2px_10px_rgba(255,255,255,0.4)]";

            const checkIcon = isSelected ? `
                <div class="absolute -top-1 -right-1 bg-green-600 text-white rounded-full p-0.5 md:p-1 shadow-lg border-2 border-white z-20">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </div>` : '';

            return `
                <div onclick="toggleSelection('${text}')" class="${baseClasses} ${texture} ${baseBorder} ${isSelected ? selectedClasses : ''}">
                    <span class="drop-shadow-md z-10">${text}</span>
                    <div class="absolute inset-2 rounded-full border-2 border-black/10 pointer-events-none"></div>
                    ${checkIcon}
                </div>
            `;
        }

        function updateMenuGrid() {
            const grid = document.getElementById('menu-grid');
            const currentDB = mode === 'consonants' ? SYLLABLES_DB : VOWELS_DB;
            const items = Object.keys(currentDB);
            
            let html = '';
            items.forEach(key => {
                const isSelected = selectedKeys.includes(key);
                html += `<div class="flex justify-center">${getSmallKegHTML(key, mode, isSelected)}</div>`;
            });
            grid.innerHTML = html;

            const allSelected = selectedKeys.length === items.length;
            document.getElementById('btn-select-all').innerText = allSelected ? "Сбросить всё" : "Выбрать всё";
            document.getElementById('selected-count').innerText = selectedKeys.length;

            const btnStart = document.getElementById('btn-start');
            if (selectedKeys.length > 0) {
                btnStart.removeAttribute('disabled');
                btnStart.className = `pointer-events-auto px-12 md:px-16 py-4 md:py-5 rounded-2xl shadow-2xl text-2xl md:text-3xl font-bold flex items-center gap-4 transition-all transform border-b-8 border-r-4 active:border-b-0 active:translate-y-2 ${mode === 'vowels' ? 'bg-red-500 hover:bg-red-400 text-white border-red-800' : 'bg-amber-500 hover:bg-amber-400 text-amber-950 border-amber-700'} translate-y-0 opacity-100`;
            } else {
                btnStart.setAttribute('disabled', 'true');
                btnStart.className = "pointer-events-auto px-12 md:px-16 py-4 md:py-5 rounded-2xl shadow-2xl text-2xl md:text-3xl font-bold flex items-center gap-4 transition-all transform border-b-8 border-r-4 bg-gray-600 text-gray-400 border-gray-800 translate-y-10 opacity-0 cursor-not-allowed";
            }

            document.getElementById('btn-mode-cons').className = `flex items-center gap-2 px-4 py-2 rounded-lg transition-all font-bold ${mode === 'consonants' ? 'bg-amber-500 text-amber-950 shadow-lg' : 'text-green-300 hover:text-white'}`;
            document.getElementById('btn-mode-vow').className = `flex items-center gap-2 px-4 py-2 rounded-lg transition-all font-bold ${mode === 'vowels' ? 'bg-red-500 text-white shadow-lg' : 'text-green-300 hover:text-white'}`;
        }

        function updateGameUI() {
            document.getElementById('big-keg-text').innerText = currentSyllable;
            
            const keg = document.getElementById('big-keg');
            const hint = document.getElementById('hint-text');
            const bag = document.getElementById('bag-icon');
            
            const texture = mode === 'vowels' 
                ? "bg-gradient-to-br from-red-100 via-red-300 to-red-500 text-red-950 border-red-800" 
                : "bg-gradient-to-br from-amber-200 via-amber-300 to-amber-500 text-amber-950 border-amber-700";

            if (isSpinning) {
                keg.className = `w-64 h-64 md:w-96 md:h-96 text-8xl md:text-[180px] relative rounded-full shadow-xl flex items-center justify-center font-bold select-none transition-transform duration-100 transform border-b-8 border-r-4 shadow-[inset_2px_2px_10px_rgba(255,255,255,0.4)] ${texture} blur-sm scale-95 animate-wiggle`;
                hint.classList.add('hidden');
                bag.classList.add('animate-pulse', 'scale-105');
            } else {
                keg.className = `w-64 h-64 md:w-96 md:h-96 text-8xl md:text-[180px] relative rounded-full shadow-xl flex items-center justify-center font-bold select-none transition-transform duration-100 transform border-b-8 border-r-4 shadow-[inset_2px_2px_10px_rgba(255,255,255,0.4)] ${texture} animate-pop`;
                bag.classList.remove('animate-pulse', 'scale-105');
                
                if (pool.length === initialPoolSize && currentSyllable === "СТАРТ") {
                    hint.classList.remove('hidden');
                } else {
                    hint.classList.add('hidden');
                }
            }

            document.getElementById('stat-remaining').innerText = pool.length;
            document.getElementById('stat-total').innerText = initialPoolSize;
            
            const pct = initialPoolSize === 0 ? 0 : ((initialPoolSize - pool.length) / initialPoolSize) * 100;
            const progress = document.getElementById('progress-fill');
            progress.style.width = `${pct}%`;
            progress.className = `h-full rounded-full shadow-[inset_0_2px_4px_rgba(255,255,255,0.4)] transition-all duration-500 ease-out ${mode === 'vowels' ? 'bg-gradient-to-r from-red-500 to-orange-400' : 'bg-gradient-to-r from-amber-500 to-yellow-400'}`;

            const volBtn = document.getElementById('btn-volume');
            if (soundEnabled) {
                volBtn.className = "p-3 rounded-full shadow-lg border-2 border-amber-800 transition-colors bg-amber-100 text-amber-900";
                volBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;
            } else {
                volBtn.className = "p-3 rounded-full shadow-lg border-2 border-amber-800 transition-colors bg-gray-700 text-gray-400";
                volBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`;
            }
        }

        function toggleSelection(key) {
            if (selectedKeys.includes(key)) {
                selectedKeys = selectedKeys.filter(k => k !== key);
            } else {
                selectedKeys.push(key);
            }
            updateMenuGrid();
        }

        function selectAll() {
            const currentDB = mode === 'consonants' ? SYLLABLES_DB : VOWELS_DB;
            const items = Object.keys(currentDB);
            if (selectedKeys.length === items.length) {
                selectedKeys = [];
            } else {
                selectedKeys = [...items];
            }
            updateMenuGrid();
        }

        function switchMode(newMode) {
            mode = newMode;
            selectedKeys = [];
            updateMenuGrid();
        }

        function startGame() {
            if (selectedKeys.length === 0) return;
            let combinedPool = [];
            const currentDB = mode === 'consonants' ? SYLLABLES_DB : VOWELS_DB;
            selectedKeys.forEach(key => {
                if (currentDB[key]) combinedPool = combinedPool.concat(currentDB[key]);
            });
            combinedPool.sort(() => Math.random() - 0.5);
            
            pool = combinedPool;
            initialPoolSize = combinedPool.length;
            gameState = 'playing';
            currentSyllable = "СТАРТ";
            isSpinning = false;
            
            showScreen('screen-game');
            updateGameUI();
        }

        function goMenu(e) {
            if(e) e.stopPropagation();
            gameState = 'menu';
            if(spinIntervalId) clearInterval(spinIntervalId);
            isSpinning = false;
            showScreen('screen-menu');
            updateMenuGrid();
        }

        function toggleSpin(e) {
            if (e) e.stopPropagation();
            if (gameState !== 'playing') return;
            if (isSpinning) stopSpin();
            else startSpin();
        }

        function startSpin() {
            if (pool.length === 0) {
                finishGame();
                return;
            }
            isSpinning = true;
            updateGameUI();
            
            spinIntervalId = setInterval(() => {
                if (pool.length > 0) {
                    const randomIndex = Math.floor(Math.random() * pool.length);
                    currentSyllable = pool[randomIndex];
                    if (soundEnabled) playSound('tick');
                    updateGameUI();
                }
            }, 80);
        }

        function stopSpin() {
            if (spinIntervalId) clearInterval(spinIntervalId);
            isSpinning = false;
            if (pool.length === 0) return;
            
            const winnerIndex = Math.floor(Math.random() * pool.length);
            currentSyllable = pool[winnerIndex];
            if (soundEnabled) playSound('win');
            
            pool.splice(winnerIndex, 1);
            updateGameUI();
        }

        function finishGame() {
            gameState = 'finished';
            document.getElementById('finish-total').innerText = initialPoolSize;
            showScreen('screen-finished');
        }

        function toggleSound(e) {
            if(e) e.stopPropagation();
            soundEnabled = !soundEnabled;
            updateGameUI();
        }

        // Управление пробелом
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (e.repeat) return;
                if (gameState === 'playing') toggleSpin();
                else if (gameState === 'finished') goMenu();
            }
        });

        // Инициализация при загрузке
        window.onload = () => {
            showScreen('screen-menu');
            updateMenuGrid();
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Слоговое Русское Лото</title>
    
    <!-- Подключаем React и ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Подключаем Babel для запуска JSX прямо в браузере -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Подключаем Tailwind CSS для стилей -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Добавляем шрифты и анимации -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Roboto Slab', serif;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-wiggle { animation: wiggle 0.2s ease-in-out infinite; }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .perspective-1000 {
            perspective: 1000px;
        }
    </style>
</head>
<body class="bg-green-800 h-screen overflow-hidden">

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    // --- Иконки (SVG) ---
    const IconRotateCcw = ({ size = 24 }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12"/><path d="M3 3v9h9"/></svg>
    );
    const IconVolume2 = ({ size = 24 }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
    );
    const IconVolumeX = ({ size = 24 }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
    );
    const IconCheck = ({ size = 24, strokeWidth = 2 }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    );
    const IconPlay = ({ size = 24, fill = "none" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    );
    const IconGrid = ({ size = 24 }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    );
    const IconType = ({ size = 24 }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
    );
    const IconShoppingBag = ({ size = 24, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    );

    // --- База Данных Слогов ---
    const SYLLABLES_DB = {
        "М": ["МА", "МУ", "МИ", "МЫ", "МО", "МЕ"],
        "С": ["СА", "СЫ", "СИ", "СЕ", "СУ", "СО"],
        "Х": ["ХА", "ХУ", "ХО", "ХИ"],
        "Р": ["РА", "РИ", "РУ", "РЫ", "РЕ", "РО"],
        "Ш": ["ШУ", "ШО", "ШИ", "ША", "ШЕ"],
        "Л": ["ЛЫ", "ЛА", "ЛУ", "ЛЮ", "ЛЯ", "ЛИ", "ЛЕ", "ЛО", "ЛЁ"],
        "Н": ["НИ", "НУ", "НА", "НЫ", "НЯ", "НЕ", "НО"],
        "К": ["КА", "КЕ", "КУ", "КО", "КИ"],
        "Т": ["ТЕ", "ТА", "ТИ", "ТЫ", "ТЮ", "ТУ", "ТО"],
        "П": ["ПЯ", "ПА", "ПУ", "ПО", "ПИ", "ПЕ"],
        "З": ["ЗА", "ЗО", "ЗИ", "ЗЕ", "ЗУ"],
        "Г": ["ГА", "ГИ", "ГО", "ГУ", "ГЕ"],
        "В": ["ВИ", "ВО", "ВЯ", "ВЫ", "ВА", "ВУ", "ВЕ"],
        "Д": ["ДЫ", "ДЕ", "ДЯ", "ДА", "ДУ", "ДО", "ДИ"],
        "Б": ["БИ", "БЕ", "БУ", "БА", "БО"],
        "Ж": ["ЖЕ", "ЖУ", "ЖЁ", "ЖИ", "ЖА"],
        "Ч": ["ЧУ", "ЧЁ", "ЧИ", "ЧА", "ЧЕ"],
        "Ц": ["ЦЕ", "ЦУ", "ЦИ", "ЦА", "ЦО"],
        "Щ": ["ЩЁ", "ЩУ", "ЩЕ", "ЩА", "ЩИ"],
        "Ф": ["ФЕ", "ФА", "ФУ", "ФО", "ФИ"]
    };

    // --- Звуковые эффекты ---
    const playSound = (type) => {
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.connect(gain);
            gain.connect(ctx.destination);

            if (type === 'tick') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
                osc.start();
                osc.stop(ctx.currentTime + 0.05);
            } else if (type === 'win') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(500, ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(800, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1);
                osc.start();
                osc.stop(ctx.currentTime + 1);
            }
        } catch (e) {
            console.error("Audio error", e);
        }
    };

    // --- Компонент "Бочонок" ---
    const WoodenKeg = ({ text, size = "large", isSpinning = false, isSelected = false, onClick, type = 'consonant' }) => {
        const baseClasses = "relative rounded-full shadow-xl flex items-center justify-center font-bold select-none transition-transform duration-100 transform";
        
        const consonantTexture = "bg-gradient-to-br from-amber-200 via-amber-300 to-amber-500 text-amber-950 border-amber-700";
        const vowelTexture = "bg-gradient-to-br from-red-100 via-red-300 to-red-500 text-red-950 border-red-800";
        
        const texture = type === 'vowel' ? vowelTexture : consonantTexture;
        
        const selectedClasses = "ring-4 ring-white scale-105 shadow-[0_0_20px_rgba(255,255,255,0.6)]";
        const baseBorder = "border-b-8 border-r-4 shadow-[inset_2px_2px_10px_rgba(255,255,255,0.4)]";

        const sizeClasses = size === "large" 
        ? `w-64 h-64 md:w-96 md:h-96 text-8xl md:text-[180px] ${isSpinning ? 'animate-wiggle' : 'animate-pop'}` 
        : "w-16 h-16 md:w-20 md:h-20 text-2xl md:text-3xl cursor-pointer hover:-translate-y-1 active:translate-y-0 active:border-b-4";

        return (
        <div 
            onClick={onClick}
            className={`${baseClasses} ${texture} ${baseBorder} ${sizeClasses} ${isSelected ? selectedClasses : ''} ${isSpinning ? 'blur-sm scale-95' : ''}`}
        >
            <span className="drop-shadow-md z-10">{text}</span>
            {/* Текстура колец */}
            <div className="absolute inset-2 rounded-full border-2 border-black/10 pointer-events-none"></div>
            
            {isSelected && (
            <div className="absolute -top-1 -right-1 bg-green-600 text-white rounded-full p-0.5 md:p-1 shadow-lg border-2 border-white z-20">
                <IconCheck size={14} strokeWidth={4} />
            </div>
            )}
        </div>
        );
    };

    // --- Основное Приложение ---
    function SyllableLotto() {
        const [gameState, setGameState] = useState('menu'); // menu, playing, finished
        const [mode, setMode] = useState('consonants'); // 'consonants' or 'vowels'
        const [selectedKeys, setSelectedKeys] = useState([]);
        const [currentSyllable, setCurrentSyllable] = useState("?");
        const [pool, setPool] = useState([]);
        const [initialPoolSize, setInitialPoolSize] = useState(0);
        const [isSpinning, setIsSpinning] = useState(false);
        const [spinIntervalId, setSpinIntervalId] = useState(null);
        const [soundEnabled, setSoundEnabled] = useState(true);
        
        const poolRef = useRef([]);
        const isSpinningRef = useRef(false);

        // Генерация базы гласных на лету
        const VOWELS_DB = useMemo(() => {
            const db = {};
            const vowels = ['А', 'О', 'У', 'Ы', 'Э', 'Я', 'Ё', 'Ю', 'И', 'Е'];
            vowels.forEach(v => db[v] = []);
            Object.values(SYLLABLES_DB).flat().forEach(syllable => {
                const lastChar = syllable.slice(-1).toUpperCase();
                if (db[lastChar]) {
                    db[lastChar].push(syllable);
                }
            });
            return db;
        }, []);

        const toggleSelection = (key) => {
            setSelectedKeys(prev => 
                prev.includes(key) 
                    ? prev.filter(k => k !== key)
                    : [...prev, key]
            );
        };

        const selectAll = () => {
            const currentDB = mode === 'consonants' ? SYLLABLES_DB : VOWELS_DB;
            if (selectedKeys.length === Object.keys(currentDB).length) {
                setSelectedKeys([]);
            } else {
                setSelectedKeys(Object.keys(currentDB));
            }
        };

        const switchMode = (newMode) => {
            setMode(newMode);
            setSelectedKeys([]);
        };

        const startGame = () => {
            if (selectedKeys.length === 0) return;

            let combinedPool = [];
            const currentDB = mode === 'consonants' ? SYLLABLES_DB : VOWELS_DB;
            
            selectedKeys.forEach(key => {
                if (currentDB[key]) {
                    combinedPool = [...combinedPool, ...currentDB[key]];
                }
            });

            combinedPool.sort(() => Math.random() - 0.5);

            setPool(combinedPool);
            setInitialPoolSize(combinedPool.length);
            poolRef.current = combinedPool;
            
            setGameState('playing');
            setCurrentSyllable("СТАРТ");
            setIsSpinning(false);
            isSpinningRef.current = false;
        };

        const stopSpin = useCallback(() => {
            if (spinIntervalId) clearInterval(spinIntervalId);
            
            setIsSpinning(false);
            isSpinningRef.current = false;

            const currentPool = poolRef.current;
            if (currentPool.length === 0) return;

            const winnerIndex = Math.floor(Math.random() * currentPool.length);
            const winner = currentPool[winnerIndex];
            
            setCurrentSyllable(winner);
            if (soundEnabled) playSound('win');

            const newPool = currentPool.filter((_, index) => index !== winnerIndex);
            setPool(newPool);
            poolRef.current = newPool;
        }, [spinIntervalId, soundEnabled]);

        const startSpin = useCallback(() => {
            if (poolRef.current.length === 0) {
                setGameState('finished');
                return;
            }

            setIsSpinning(true);
            isSpinningRef.current = true;
            
            const id = setInterval(() => {
                if (poolRef.current.length > 0) {
                    const randomIndex = Math.floor(Math.random() * poolRef.current.length);
                    setCurrentSyllable(poolRef.current[randomIndex]);
                    if (soundEnabled) playSound('tick');
                }
            }, 80); 
            setSpinIntervalId(id);
        }, [soundEnabled]);

        const toggleSpin = useCallback(() => {
            if (gameState !== 'playing') return;
            if (isSpinningRef.current) stopSpin();
            else startSpin();
        }, [gameState, startSpin, stopSpin]);

        useEffect(() => {
            const handleKeyDown = (e) => {
                if (e.code === 'Space') {
                    e.preventDefault(); 
                    if (e.repeat) return; 
                    if (gameState === 'menu') return;
                    if (gameState === 'finished') {
                        setGameState('menu');
                        return;
                    }
                    toggleSpin();
                }
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
        }, [gameState, toggleSpin]);

        useEffect(() => {
            return () => { if (spinIntervalId) clearInterval(spinIntervalId); };
        }, [spinIntervalId]);

        // --- Рендер Экранов ---

        const renderMenu = () => {
            const currentDB = mode === 'consonants' ? SYLLABLES_DB : VOWELS_DB;
            const allSelected = selectedKeys.length === Object.keys(currentDB).length;
            const items = Object.keys(currentDB);

            return (
                <div className="flex flex-col items-center min-h-screen bg-green-800 p-4 font-sans text-amber-100 relative overflow-hidden">
                    <div className="absolute inset-0 opacity-10 pointer-events-none" style={{ backgroundImage: 'radial-gradient(#fff 1px, transparent 1px)', backgroundSize: '20px 20px' }}></div>

                    <h1 className="text-3xl md:text-5xl font-black text-amber-200 mb-2 text-center uppercase tracking-wider mt-4 drop-shadow-lg" style={{textShadow: '2px 4px 0px #3a1c06'}}>
                        Русское Лото
                    </h1>
                    
                    {/* Переключатель режимов */}
                    <div className="flex bg-green-900/60 p-1 rounded-xl mb-6 backdrop-blur-md border border-green-700 shadow-inner z-10">
                        <button 
                            onClick={() => switchMode('consonants')}
                            className={`flex items-center gap-2 px-4 py-2 rounded-lg transition-all font-bold ${mode === 'consonants' ? 'bg-amber-500 text-amber-950 shadow-lg' : 'text-green-300 hover:text-white'}`}
                        >
                            <IconGrid size={18} /> По согласным
                        </button>
                        <button 
                            onClick={() => switchMode('vowels')}
                            className={`flex items-center gap-2 px-4 py-2 rounded-lg transition-all font-bold ${mode === 'vowels' ? 'bg-red-500 text-white shadow-lg' : 'text-green-300 hover:text-white'}`}
                        >
                            <IconType size={18} /> По гласным
                        </button>
                    </div>
                    
                    {/* Контролы */}
                    <div className="flex gap-4 mb-4 w-full max-w-5xl justify-between items-center z-10 px-2">
                        <p className="text-sm md:text-lg font-bold bg-green-900/50 px-4 py-2 rounded-lg backdrop-blur-sm border border-green-700">
                            Выбрано: {selectedKeys.length}
                        </p>
                        <button 
                            onClick={selectAll}
                            className="text-xs md:text-sm text-amber-100 font-bold hover:bg-green-700/50 px-4 py-2 rounded-lg transition-colors border border-amber-100/30"
                        >
                            {allSelected ? "Сбросить всё" : "Выбрать всё"}
                        </button>
                    </div>
                    
                    {/* Сетка бочонков */}
                    <div className="grid grid-cols-5 md:grid-cols-6 lg:grid-cols-8 gap-3 md:gap-4 max-w-6xl w-full mb-32 z-10 perspective-1000 px-2">
                        {items.map((key) => (
                            <div key={key} className="flex justify-center">
                                <WoodenKeg 
                                    text={key} 
                                    size="small" 
                                    type={mode === 'vowels' ? 'vowel' : 'consonant'}
                                    isSelected={selectedKeys.includes(key)}
                                    onClick={() => toggleSelection(key)}
                                />
                            </div>
                        ))}
                    </div>

                    {/* Кнопка Старта */}
                    <div className="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-green-900 via-green-900/90 to-transparent flex justify-center z-20 pointer-events-none">
                        <button
                            onClick={startGame}
                            disabled={selectedKeys.length === 0}
                            className={`
                                pointer-events-auto px-12 md:px-16 py-4 md:py-5 rounded-2xl shadow-2xl text-2xl md:text-3xl font-bold flex items-center gap-4 transition-all transform border-b-8 border-r-4 active:border-b-0 active:translate-y-2
                                ${selectedKeys.length > 0 
                                    ? (mode === 'vowels' ? 'bg-red-500 hover:bg-red-400 text-white border-red-800' : 'bg-amber-500 hover:bg-amber-400 text-amber-950 border-amber-700') + ' translate-y-0 opacity-100' 
                                    : 'bg-gray-600 text-gray-400 border-gray-800 translate-y-10 opacity-0'}
                            `}
                        >
                            <IconPlay fill="currentColor" size={32} /> ИГРАТЬ
                        </button>
                    </div>
                </div>
            );
        };

        const renderGame = () => (
            <div 
                className="flex flex-col items-center justify-center min-h-screen bg-green-800 p-4 cursor-pointer select-none overflow-hidden relative"
                onClick={toggleSpin}
            >
                <div className="absolute inset-0 opacity-20 pointer-events-none mix-blend-overlay" 
                    style={{ backgroundImage: `url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23000000' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")` }}>
                </div>

                <div className="absolute top-4 left-4 flex gap-4 z-20">
                    <button 
                        onClick={(e) => { e.stopPropagation(); setGameState('menu'); }}
                        className="flex items-center gap-2 px-5 py-2 bg-amber-100 rounded-full shadow-lg text-amber-900 hover:bg-white font-bold border-2 border-amber-800 transition-colors"
                    >
                        <IconRotateCcw size={20} /> Меню
                    </button>
                </div>

                <div className="absolute top-4 right-4 z-20">
                    <button 
                        onClick={(e) => { e.stopPropagation(); setSoundEnabled(!soundEnabled); }}
                        className={`p-3 rounded-full shadow-lg border-2 border-amber-800 transition-colors ${soundEnabled ? 'bg-amber-100 text-amber-900' : 'bg-gray-700 text-gray-400'}`}
                    >
                        {soundEnabled ? <IconVolume2 size={24} /> : <IconVolumeX size={24} />}
                    </button>
                </div>

                <div className="relative w-full flex flex-col justify-center items-center z-10">
                    <div className="absolute -bottom-64 transition-transform duration-500 ease-in-out">
                         <IconShoppingBag size={400} className={`text-red-900/40 drop-shadow-2xl ${isSpinning ? 'animate-pulse scale-105' : 'scale-100'}`} />
                    </div>

                    <div className="relative z-20 pt-10">
                         <WoodenKeg 
                            text={currentSyllable} 
                            size="large" 
                            isSpinning={isSpinning}
                         />
                    </div>

                    {!isSpinning && pool.length === initialPoolSize && currentSyllable === "СТАРТ" && (
                        <div className="mt-12 animate-bounce bg-white/90 text-green-900 px-8 py-3 rounded-full font-bold text-xl shadow-xl border-2 border-green-700 text-center">
                            Нажми пробел, чтобы достать бочонок
                        </div>
                    )}
                </div>

                <div className="absolute bottom-8 bg-amber-900/40 backdrop-blur-md p-4 rounded-2xl border border-amber-700/50 w-full max-w-2xl mx-4 flex flex-col items-center">
                    <div className="flex justify-between w-full text-amber-100 mb-2 px-2 font-mono font-bold">
                        <span>ОСТАЛОСЬ: {pool.length}</span>
                        <span>ВСЕГО: {initialPoolSize}</span>
                    </div>
                    
                    <div className="h-6 w-full bg-black/40 rounded-full overflow-hidden border border-amber-900/50 p-1">
                        <div 
                            className={`h-full rounded-full shadow-[inset_0_2px_4px_rgba(255,255,255,0.4)] transition-all duration-500 ease-out ${mode === 'vowels' ? 'bg-gradient-to-r from-red-500 to-orange-400' : 'bg-gradient-to-r from-amber-500 to-yellow-400'}`}
                            style={{ width: `${((initialPoolSize - pool.length) / initialPoolSize) * 100}%` }}
                        />
                    </div>
                </div>
            </div>
        );

        const renderFinished = () => (
            <div className="flex flex-col items-center justify-center min-h-screen bg-green-800 p-4 font-sans text-center relative overflow-hidden">
                <div className="absolute inset-0 opacity-20" 
                    style={{ backgroundImage: `url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23000000' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")` }}>
                </div>

                <div className="bg-amber-100 p-12 rounded-[3rem] shadow-2xl border-8 border-amber-700 animate-in fade-in zoom-in duration-500 max-w-2xl w-full z-10 relative">
                    <div className="absolute -top-10 left-1/2 -translate-x-1/2 bg-red-600 text-white px-8 py-2 rounded-full font-bold shadow-lg border-4 border-white">
                        ФИНИШ
                    </div>
                    
                    <h2 className="text-5xl md:text-6xl font-black text-amber-900 mb-6 drop-shadow-sm mt-4">ПОБЕДА!</h2>
                    <p className="text-2xl text-amber-800 mb-8 font-serif">
                        Мешочек пуст. Все {initialPoolSize} бочонков найдены!
                    </p>
                    
                    <button
                        onClick={() => setGameState('menu')}
                        className="w-full md:w-auto px-10 py-5 bg-green-600 hover:bg-green-500 text-white text-xl md:text-2xl font-bold rounded-2xl shadow-xl border-b-8 border-green-800 active:border-b-0 active:translate-y-2 transition-all flex items-center justify-center gap-3 mx-auto"
                    >
                        <IconRotateCcw size={24} /> НОВАЯ ИГРА
                    </button>
                </div>
            </div>
        );

        // Рендер в зависимости от состояния
        return (
            <div className="font-sans antialiased text-gray-900 h-screen">
                {gameState === 'menu' && renderMenu()}
                {gameState === 'playing' && renderGame()}
                {gameState === 'finished' && renderFinished()}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SyllableLotto />);
</script>

</body>
</html>
